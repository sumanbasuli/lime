services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lime
      POSTGRES_PASSWORD: lime_docs_password
      POSTGRES_DB: lime_docs_db
    ports:
      - "${LIME_DOCS_DB_PORT:-15432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lime -d lime_docs_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  shopkeeper:
    build:
      context: .
      dockerfile: shopkeeper/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ACT_RULES_PATH: /shared-data/act-rules.json
      DATABASE_URL: postgresql://lime:lime_docs_password@db:5432/lime_docs_db?sslmode=disable
      REPORT_BASE_URL: http://ui:3000
      SHOPKEEPER_PORT: 8080
    ports:
      - "${LIME_DOCS_API_PORT:-18080}:8080"
    shm_size: "2gb"
    volumes:
      - ./data:/shared-data:ro
      - screenshots:/app/screenshots
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  ui:
    build:
      context: .
      dockerfile: lime/Dockerfile
    restart: unless-stopped
    depends_on:
      shopkeeper:
        condition: service_healthy
    environment:
      ACT_RULES_PATH: /shared-data/act-rules.json
      DATABASE_URL: postgresql://lime:lime_docs_password@db:5432/lime_docs_db?sslmode=disable
      SHOPKEEPER_URL: http://shopkeeper:8080
      LIME_UPDATE_CHECK: "false"
      LIME_GITHUB_REPO: sumanbasuli/lime
      LIME_VERSION: docs-demo
    ports:
      - "${LIME_DOCS_UI_PORT:-13000}:3000"
    volumes:
      - ./data:/shared-data:ro

volumes:
  pgdata:
  screenshots:
