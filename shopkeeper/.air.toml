root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/shopkeeper"
  cmd = "go build -o ./tmp/shopkeeper ./cmd/shopkeeper"
  delay = 1000
  exclude_dir = ["tmp", "migrations", "vendor"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  include_ext = ["go"]
  kill_delay = "0s"
  log = "build-errors.log"
  send_interrupt = false
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
