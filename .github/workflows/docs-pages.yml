name: Docs Pages

on:
  workflow_dispatch:
    inputs:
      base_path:
        description: "Optional base path for project-site builds, for example /lime. Leave empty for the custom domain."
        required: false
        default: ""
  push:
    branches:
      - main
    paths:
      - "docs-site/**"
      - "docs/**"
      - "assets/**"
      - "README.md"
      - "CHANGELOG.md"
      - ".github/workflows/docs-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build static docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: docs-site

      - name: Build docs site
        run: npm run build
        working-directory: docs-site
        env:
          LIME_DOCS_BASE_PATH: ${{ github.event.inputs.base_path || '' }}
          NEXT_PUBLIC_LIME_DOCS_URL: https://lime.heysuman.com/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs-site/out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
