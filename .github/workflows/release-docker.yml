name: Release Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      file_version: ${{ steps.release.outputs.file_version }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      image_namespace: ${{ steps.release.outputs.image_namespace }}
      image_tag: ${{ steps.release.outputs.image_tag }}
      sha_tag: ${{ steps.release.outputs.sha_tag }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail

          FILE_VERSION="$(tr -d '[:space:]' < VERSION)"
          if [[ -z "${FILE_VERSION}" ]]; then
            echo "VERSION is empty" >&2
            exit 1
          fi

          RELEASE_TAG="v${FILE_VERSION}"
          OWNER_LC="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAMESPACE="ghcr.io/${OWNER_LC}"
          SHA_TAG="sha-${GITHUB_SHA::12}"

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            git fetch --force --tags origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
            TAG_SHA="$(git rev-list -n 1 "${RELEASE_TAG}")"
            if [[ "${TAG_SHA}" != "${GITHUB_SHA}" ]]; then
              echo "Release tag ${RELEASE_TAG} already exists at ${TAG_SHA}, not ${GITHUB_SHA}." >&2
              echo "Bump VERSION and add a matching CHANGELOG.md section before merging to main." >&2
              exit 1
            fi
          fi

          ./scripts/extract-release-notes.sh "${FILE_VERSION}" >/tmp/release-notes.md

          echo "file_version=${FILE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "image_namespace=${IMAGE_NAMESPACE}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "sha_tag=${SHA_TAG}" >> "${GITHUB_OUTPUT}"

  publish:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        include:
          - name: ui
            package: lime-ui
            context: .
            dockerfile: ./lime/Dockerfile
          - name: shopkeeper
            package: lime-shopkeeper
            context: .
            dockerfile: ./shopkeeper/Dockerfile

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.image_namespace }}/${{ matrix.package }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.image_tag }}
            type=raw,value=${{ needs.prepare.outputs.sha_tag }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=LIME ${{ matrix.name }}
            org.opencontainers.image.description=LIME accessibility scanner ${{ matrix.name }} image
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.release_tag }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            LIME_VERSION=${{ needs.prepare.outputs.file_version }}
            LIME_COMMIT=${{ github.sha }}

  release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - publish

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release bundle
        env:
          LIME_IMAGE_REGISTRY: ${{ needs.prepare.outputs.image_namespace }}
        run: ./scripts/build-release-bundle.sh "${{ needs.prepare.outputs.file_version }}"

      - name: Build release notes from CHANGELOG.md
        run: |
          mkdir -p dist
          ./scripts/extract-release-notes.sh "${{ needs.prepare.outputs.file_version }}" > dist/release-notes.md

      - name: Ensure release tag exists
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ needs.prepare.outputs.release_tag }}"

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            git fetch --force --tags origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          RELEASE_TITLE: LIME ${{ needs.prepare.outputs.release_tag }}
          RELEASE_BUNDLE: dist/lime-${{ needs.prepare.outputs.release_tag }}-release.tar.gz
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --notes-file dist/release-notes.md \
              --latest
            gh release upload "${RELEASE_TAG}" "${RELEASE_BUNDLE}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${RELEASE_BUNDLE}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_TITLE}" \
              --notes-file dist/release-notes.md \
              --latest
          fi
