name: Release Docker Images

on:
  release:
    types:
      - published

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: ui
            image: ghcr.io/sumanbasuli/lime-ui
            context: ./lime
            dockerfile: ./lime/Dockerfile
          - name: shopkeeper
            image: ghcr.io/sumanbasuli/lime-shopkeeper
            context: ./shopkeeper
            dockerfile: ./shopkeeper/Dockerfile

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          FILE_VERSION="$(tr -d '[:space:]' < VERSION)"
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          EXPECTED_TAG="v${FILE_VERSION}"

          if [[ "${RELEASE_TAG}" != "${EXPECTED_TAG}" ]]; then
            echo "VERSION (${FILE_VERSION}) does not match release tag (${RELEASE_TAG})" >&2
            exit 1
          fi

          echo "file_version=${FILE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.version.outputs.release_tag }}
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}
          labels: |
            org.opencontainers.image.title=LIME ${{ matrix.name }}
            org.opencontainers.image.description=LIME accessibility scanner ${{ matrix.name }} image
            org.opencontainers.image.source=https://github.com/sumanbasuli/lime
            org.opencontainers.image.version=${{ steps.version.outputs.release_tag }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  bundle:
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          FILE_VERSION="$(tr -d '[:space:]' < VERSION)"
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          EXPECTED_TAG="v${FILE_VERSION}"

          if [[ "${RELEASE_TAG}" != "${EXPECTED_TAG}" ]]; then
            echo "VERSION (${FILE_VERSION}) does not match release tag (${RELEASE_TAG})" >&2
            exit 1
          fi

          echo "file_version=${FILE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Build release bundle
        run: ./scripts/build-release-bundle.sh "${{ steps.version.outputs.file_version }}"

      - name: Attach release bundle
        uses: softprops/action-gh-release@v2
        with:
          files: dist/lime-${{ steps.version.outputs.release_tag }}-release.tar.gz
