name: Release Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "VERSION"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        shell: bash
        run: |
          set -euo pipefail
          FILE_VERSION="$(tr -d '[:space:]' < VERSION)"
          OWNER_LC="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"

          echo "LIME_VERSION=${FILE_VERSION}" >> "${GITHUB_ENV}"
          echo "LIME_IMAGE_TAG=v${FILE_VERSION}" >> "${GITHUB_ENV}"
          echo "LIME_IMAGE_REGISTRY=ghcr.io/${OWNER_LC}" >> "${GITHUB_ENV}"
          echo "LIME_SHA_TAG=sha-${GITHUB_SHA::12}" >> "${GITHUB_ENV}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: shopkeeper/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: npm
          cache-dependency-path: lime/package-lock.json

      - name: Install UI dependencies
        run: npm ci --prefix lime

      - name: Validate changelog entry
        run: ./scripts/extract-release-notes.sh "${LIME_VERSION}" >/dev/null

      - name: Build release artifacts
        run: make build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish images
        run: make publish-release-images

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/publish-github-release.sh "${LIME_IMAGE_TAG}"
