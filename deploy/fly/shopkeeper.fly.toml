# Fly.io config for the LIME Shopkeeper (Go backend + Chromium).
#
# Deploy target:
#   fly deploy --config deploy/fly/shopkeeper.fly.toml \
#     --image ghcr.io/sumanbasuli/lime-shopkeeper:v0.1.0 \
#     --app lime-shopkeeper
#
# This service is internal-only. The UI reaches it via Fly's
# private `.internal` DNS at http://lime-shopkeeper.internal:8080.
# No public port is exposed.

app = "lime-shopkeeper"
primary_region = "iad"

[build]
  image = "ghcr.io/sumanbasuli/lime-shopkeeper:latest"

[env]
  ACT_RULES_PATH = "/shared-data/act-rules.json"
  SHOPKEEPER_PORT = "8080"

[[mounts]]
  source = "lime_screenshots"
  destination = "/app/screenshots"
  initial_size = "10gb"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 8080
    handlers = []

  [[services.tcp_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"
    method = "get"
    path = "/api/health"
    protocol = "http"

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"

[deploy]
  strategy = "rolling"
